<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>GoPromo CRM</title>
<style>
body{font-family:Arial;max-width:1100px;margin:20px auto}
.col{width:32%;display:inline-block;vertical-align:top;background:#f4f4f4;padding:10px;border-radius:10px}
.card{background:white;padding:8px;margin:6px 0;border-radius:8px}
textarea{width:100%;height:80px}
</style>
</head>
<body>

<h2>🚀 GoPromo CRM</h2>

<textarea id="text" placeholder="Вставь отклик... (Enter = добавить)"></textarea><br><br>
<button onclick="addLead()">Добавить</button>
<button onclick="loadLeads()">Обновить</button>
<button onclick="window.location='/api/export'">📤 Excel</button>

<br><br>
<input type="file" id="file">
<button onclick="importFile()">📥 Импорт</button>

<p id="msg"></p>

<h3>📊 Канбан</h3>

<div class="col"><h4>Новый</h4><div id="new"></div></div>
<div class="col"><h4>Записан</h4><div id="ok"></div></div>
<div class="col"><h4>Отказ</h4><div id="no"></div></div>

<script>
document.getElementById("text").addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){
    e.preventDefault();
    addLead();
  }
});

async function addLead(){
  const text=document.getElementById("text").value.trim();
  if(!text) return;

  await fetch("/api/manual-lead",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({text})
  });

  document.getElementById("text").value="";
  loadLeads();
}

async function importFile(){
  const file=document.getElementById("file").files[0];
  if(!file){alert("Выбери файл");return;}

  const fd=new FormData();
  fd.append("file",file);

  const res=await fetch("/api/import",{method:"POST",body:fd});
  const data=await res.json();

  document.getElementById("msg").innerText =
    `Импортировано: ${data.added||0}`;

  loadLeads();
}

async function loadLeads(){
  const res=await fetch("/api/leads");
  const data=await res.json();

  new.innerHTML="";
  ok.innerHTML="";
  no.innerHTML="";

  data.forEach(l=>{
    const div=document.createElement("div");
    div.className="card";

    const tg=l.phone
      ? `<a href="https://t.me/+${l.phone}" target="_blank">TG</a>`
      : "";

    div.innerHTML=
      `${l.name} (${l.age||"—"}) ${l.city}<br>📱 ${l.phone||"—"} ${tg}`;

    if(l.status==="Записан") ok.appendChild(div);
    else if(l.status==="Отказ") no.appendChild(div);
    else new.appendChild(div);
  });
}

loadLeads();
</script>

</body>
</html>
