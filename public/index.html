<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>GoPromo — Быстрое добавление</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 40px auto; }
    textarea { width: 100%; height: 120px; }
    button { padding: 12px 20px; font-size: 16px; cursor: pointer; }
    .result { margin-top: 15px; }
  </style>
</head>
<body>
  <h2>🚀 Добавить из Авито</h2>

  <textarea id="text" placeholder="Вставь сообщение кандидата..."></textarea>
  <br /><br />
  <button onclick="send()">Добавить</button>

  <div class="result" id="result"></div>

  <script>
    async function send() {
      const text = document.getElementById("text").value;

      const res = await fetch("/api/manual-lead", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text })
      });

      const data = await res.json();
      document.getElementById("result").innerText =
        "Готово: " + JSON.stringify(data.lead);
    }
  </script>
</body>
</html>
